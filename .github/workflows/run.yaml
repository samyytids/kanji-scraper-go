name: terraform

on:
  pull_request:
    branches:
      - main

env:
  TF_VAR_mongo_host: ${{ vars.MONGO_HOST}}
  TF_VAR_mongo_port: ${{ vars.MONGO_PORT}}
  TF_VAR_mongo_admin_username: ${{ vars.MONGO_ADMIN_USERNAME}}
  TF_VAR_mongo_admin_password: ${{ vars.MONGO_ADMIN_PASSWORD}}
  TF_VAR_mongo_db_name: ${{ vars.MONGO_DB_NAME}}
  TF_VAR_app_username: ${{ vars.APP_USERNAME}}
  TF_VAR_app_password: ${{ vars.APP_PASSWORD}}
  TF_VAR_mongo_user_role: ${{ vars.MONGO_USER_ROLE}}
  TF_VAR_mongo_user_db: ${{ vars.MONGO_USER_DB}}

jobs:
  terraform:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform init
      - name: Terraform Format Check
        run: terraform fmt
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Apply
        run: terraform apply -auto-approve
      
